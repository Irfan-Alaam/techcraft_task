server {
    listen 5173;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all unknown routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend service
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE support — disable buffering so stream events arrive immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}